services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ASTRACORE_CONFIG: "/app/config/config.docker.yaml"
    volumes:
      - astracore_data:/app/data
      - chroma_models:/home/appuser/.cache/chroma
    depends_on:
      redis:
        condition: service_healthy

volumes:
  astracore_data:
  chroma_models:   # ChromaDB ONNX model cache — persists across restarts, downloaded once
